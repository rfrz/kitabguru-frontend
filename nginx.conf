server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Handle React Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the backend
    location /api/v1/ {
        proxy_pass http://backend:8000/api/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static media files served from the backend volume
    # (assuming we configure nginx to have access to the volume, or we just let backend serve it)
    # The docker-compose backend handles /media/ via FastAPI StaticFiles for now.
    location /media/ {
        proxy_pass http://backend:8000/media/;
    }
}
