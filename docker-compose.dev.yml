version: '3.8'

services:
  frontend-dev:
    image: node:24-alpine
    working_dir: /app
    volumes:
      # Mount current directory into container
      - .:/app
      # Create an anonymous volume for node_modules to avoid overwriting host's node_modules and performance issues
      - /app/node_modules
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm run dev"
    environment:
      - CHOKIDAR_USEPOLLING=true # Use polling for file changes to ensure hot-reload works reliably across different OS/WSL
